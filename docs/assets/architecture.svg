<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="WebGL 2 Systems Architect Skill Architecture">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .panel{fill:#121a31;stroke:#5b78c7;stroke-width:2;rx:16}
      .panel2{fill:#16203d;stroke:#7aa2f7;stroke-width:2;rx:16}
      .title{fill:#eef3ff;font:700 28px Arial, sans-serif}
      .subtitle{fill:#d8e2ff;font:600 20px Arial, sans-serif}
      .txt{fill:#d8e2ff;font:400 18px Arial, sans-serif}
      .small{fill:#b8c7f5;font:400 16px Arial, sans-serif}
      .arrow{stroke:#8fb2ff;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8fb2ff"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="58">WebGL 2 Systems Architect Skill</text>
  <text class="small" x="60" y="86">Progressive disclosure • lane-based orchestration • schema-backed output</text>

  <rect class="panel2" x="440" y="120" width="320" height="110" rx="18"/>
  <text class="subtitle" x="520" y="160">SKILL.md</text>
  <text class="txt" x="502" y="192">Tiny router</text>
  <text class="small" x="468" y="216">Loads only the orchestrator</text>

  <rect class="panel" x="380" y="280" width="440" height="120" rx="18"/>
  <text class="subtitle" x="468" y="322">references/00-orchestrator.md</text>
  <text class="txt" x="452" y="354">Triage • module selection • lane join</text>
  <text class="small" x="444" y="380">Parallel when real, serial when necessary</text>

  <path class="arrow" d="M600 230 L600 280"/>

