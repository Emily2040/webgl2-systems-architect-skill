<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="WebGL 2 Systems Architect routing and lane architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071126"/>
      <stop offset="100%" stop-color="#0f1f45"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2f62"/>
      <stop offset="100%" stop-color="#14264f"/>
    </linearGradient>
    <style>
      .title{fill:#eef4ff;font:700 42px Inter,Arial,sans-serif}
      .sub{fill:#bcd1ff;font:500 21px Inter,Arial,sans-serif}
      .h{fill:#e9f2ff;font:700 24px Inter,Arial,sans-serif}
      .t{fill:#c6d9ff;font:500 18px Inter,Arial,sans-serif}
      .box{fill:url(#panel);stroke:#7bb7ff;stroke-width:2.2;rx:20}
      .lane{fill:#162c59;stroke:#88beff;stroke-width:2;rx:18}
      .arr{stroke:#8dc4ff;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8dc4ff"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text class="title" x="70" y="74">WebGL 2 Systems Architect · Execution Blueprint</text>
  <text class="sub" x="70" y="108">Triage-first routing, capability-aware decisions, and lane-joined outputs.</text>

  <rect class="box" x="500" y="150" width="400" height="120" rx="20"/>
  <text class="h" x="650" y="198">SKILL.md</text>
  <text class="t" x="598" y="226">Tiny router · canonical entrypoint</text>

  <rect class="box" x="430" y="330" width="540" height="140" rx="20"/>
  <text class="h" x="503" y="383">references/00-orchestrator.md</text>
  <text class="t" x="486" y="414">Build task record · choose modules · join lanes</text>
  <text class="t" x="496" y="440">Measured evidence &gt; capability limits &gt; constraints</text>

  <path class="arr" d="M700 270 L700 330"/>

  <rect class="lane" x="60" y="560" width="250" height="190" rx="18"/>
  <text class="h" x="111" y="610">Hardware lane</text>
  <text class="t" x="86" y="645">02-hardware-budget</text>
  <text class="t" x="86" y="673">caps, tiers, frame budget</text>
  <text class="t" x="86" y="701">DPR guardrails</text>

  <rect class="lane" x="330" y="560" width="250" height="190" rx="18"/>
  <text class="h" x="382" y="610">Subject lane</text>
  <text class="t" x="358" y="645">04-subject-audit</text>
  <text class="t" x="358" y="673">P0/P1/P2 definition</text>
  <text class="t" x="358" y="701">missing-obvious checks</text>

  <rect class="lane" x="600" y="560" width="250" height="190" rx="18"/>
  <text class="h" x="646" y="610">Pipeline lane</text>
  <text class="t" x="628" y="645">03-pipeline-and-concurrency</text>
  <text class="t" x="628" y="673">serial vs async truth</text>
  <text class="t" x="628" y="701">pass graph & startup flow</text>

  <rect class="lane" x="870" y="560" width="250" height="190" rx="18"/>
  <text class="h" x="932" y="610">Code lane</text>
  <text class="t" x="899" y="645">05-shader-rules</text>
  <text class="t" x="899" y="673">06-runtime-ops</text>
  <text class="t" x="899" y="701">stalls, leaks, correctness</text>

  <rect class="lane" x="1140" y="560" width="200" height="190" rx="18"/>
  <text class="h" x="1167" y="610">Validation lane</text>
  <text class="t" x="1167" y="645">07-validation-and-ci</text>
  <text class="t" x="1167" y="673">regression + confidence</text>

  <path class="arr" d="M700 470 L185 560"/>
  <path class="arr" d="M700 470 L455 560"/>
  <path class="arr" d="M700 470 L725 560"/>
  <path class="arr" d="M700 470 L995 560"/>
  <path class="arr" d="M700 470 L1240 560"/>

  <rect class="box" x="370" y="790" width="660" height="72" rx="18"/>
  <text class="h" x="454" y="834">Output contracts: prose sections or schema JSON (authoring-base/runtime-compact)</text>
</svg>
