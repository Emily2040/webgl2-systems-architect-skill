  <text class="subtitle" x="116" y="510">Hardware lane</text>
  <text class="small" x="103" y="540">02-hardware-budget</text>
  <text class="small" x="103" y="568">caps, DPR, timing, tiers</text>

  <rect class="panel" x="300" y="470" width="210" height="150" rx="18"/>
  <text class="subtitle" x="350" y="510">Subject lane</text>
  <text class="small" x="348" y="540">04-subject-audit</text>
  <text class="small" x="334" y="568">P0/P1/P2 feature checklist</text>

  <rect class="panel" x="530" y="470" width="210" height="150" rx="18"/>
  <text class="subtitle" x="576" y="510">Pipeline lane</text>
  <text class="small" x="555" y="540">03-pipeline-and-concurrency</text>
  <text class="small" x="568" y="568">serial vs async tasks</text>

  <rect class="panel" x="760" y="470" width="210" height="150" rx="18"/>
  <text class="subtitle" x="818" y="510">Code lane</text>
  <text class="small" x="798" y="540">05-shader-rules</text>
  <text class="small" x="788" y="568">06-runtime-ops</text>

  <rect class="panel" x="990" y="470" width="150" height="150" rx="18"/>
  <text class="subtitle" x="1010" y="510">Validation</text>
  <text class="small" x="1010" y="540">07-validation</text>
  <text class="small" x="1008" y="568">CI + confidence</text>

  <path class="arrow" d="M600 400 L175 470"/>
  <path class="arrow" d="M600 400 L405 470"/>
  <path class="arrow" d="M600 400 L635 470"/>
  <path class="arrow" d="M600 400 L865 470"/>
  <path class="arrow" d="M600 400 L1065 470"/>

  <rect class="panel2" x="360" y="650" width="480" height="72" rx="18"/>
  <text class="subtitle" x="416" y="690">Schemas + examples + validator + wrappers</text>
